<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classical Lab Record Generator</title>
    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* CLASSICAL ACADEMIC THEME */
        :root {
            --bg-color: #f4f4f4; /* Light classical gray */
            --surface: #ffffff;  /* Pure white */
            --text-main: #000000; /* Pure black text for academic feel */
            --text-muted: #555555;
            --border: #888888;
            --border-light: #cccccc;
            --primary: #333333;
            --primary-hover: #000000;
            --shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif; /* Academic typography */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            font-size: 16px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* HEADERS & PANELS */
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 15px;
            position: relative;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-style: italic;
        }

        .btn-settings {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 5px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        /* GRID & INPUTS */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; position: relative; }
        .input-group label {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select, textarea {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            outline: none;
            font-size: 1rem;
            font-family: Arial, sans-serif; /* Inputs in sans-serif for readability */
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--text-main);
            border-width: 2px;
            padding: 9px; /* Compensate for border width */
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Courier New', Courier, monospace; /* Monospace for text areas */
            white-space: pre-wrap;
        }

        /* BUTTONS */
        button {
            background: var(--primary);
            color: #ffffff;
            border: 1px solid var(--text-main);
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-outline {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { background: #eeeeee; }

        .btn-mini {
            position: absolute;
            right: 0;
            top: 0;
            padding: 3px 8px;
            font-size: 0.75rem;
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-mini:hover { background: #e0e0e0; }

        /* STATUS & INDICATORS */
        .status-bar {
            background: #e8e8e8;
            border: 1px solid var(--border);
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        .text-success { color: #006600; font-weight: bold; }
        .text-error { color: #cc0000; font-weight: bold; }
        .text-processing { color: #0000cc; font-weight: bold; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--surface);
            padding: 30px;
            border: 2px solid var(--text-main);
            width: 90%;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content h2 { margin-bottom: 15px; text-transform: uppercase; font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        .modal-editor-textarea {
            width: 100%; height: 300px; margin-bottom: 15px; font-family: 'Courier New', Courier, monospace;
        }

        .modal-toolbar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        
        /* Auto-save visual cue */
        .save-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--text-main); color: #fff;
            padding: 10px 20px; font-family: sans-serif; font-size: 0.85rem;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999;
        }
        .save-toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Laboratory Record Generator</h1>
        <p>Classical Academic Format • Intelligent Self-Correcting Execution Engine</p>
        <button class="btn-settings" onclick="toggleModal('settingsModal')">Configuration</button>
    </div>

    <!-- SYSTEM STATUS -->
    <div class="status-bar" id="systemStatus">
        <span id="sysMsg">SYSTEM IDLE. AWAITING INPUT.</span>
        <span>
            <span id="wmStatus">❖ LOGO: CHECKING</span> | 
            <span id="fontStatus">❖ FONT: CHECKING</span>
        </span>
    </div>

    <!-- AI GENERATION & SMART PASTE -->
    <div class="panel">
        <div class="panel-title">Automated Record Generation</div>
        <div class="grid-2">
            <div class="input-group">
                <label>Experiment Topic / Description</label>
                <textarea id="aiTopic" style="min-height: 80px;" placeholder="e.g., Matrix Multiplication, Linked List Implementation..."></textarea>
                <button onclick="generateFromTopic()" id="btnGenerateTopic" style="margin-top: 10px;">Generate Full Record (AI)</button>
            </div>
            <div class="input-group">
                <label>Smart Paste (Paste AI Output Here)</label>
                <textarea id="smartPaste" style="min-height: 80px;" placeholder="Paste unstructured record data. Fields will auto-populate..."></textarea>
                <button onclick="processSmartPaste()" class="btn-outline" style="margin-top: 10px;">Extract & Populate</button>
            </div>
        </div>
    </div>

    <!-- RECORD DETAILS -->
    <div class="panel">
        <div class="panel-title">Student & Experiment Details</div>
        <div class="grid-2">
            <div class="input-group"><label>Student Name</label><input type="text" id="studentName" placeholder="E.g. Ajay S"></div>
            <div class="input-group"><label>Register Number</label><input type="text" id="regNo" placeholder="E.g. 710725105001"></div>
            <div class="input-group"><label>Experiment Number</label><input type="text" id="expNo" placeholder="E.g. 1(A)"></div>
            <div class="input-group"><label>Date</label><input type="text" id="expDate" placeholder="E.g. 12/10/2023"></div>
        </div>
        <div class="input-group"><label>Experiment Title</label><input type="text" id="expTitle"></div>
    </div>

    <!-- RECORD CONTENT -->
    <div class="panel">
        <div class="panel-title">Laboratory Content</div>
        
        <div class="input-group">
            <label>AIM</label>
            <button class="btn-mini" onclick="openEditor('aim', 'AIM')">Editor / Fix</button>
            <textarea id="aim"></textarea>
        </div>
        
        <div class="input-group">
            <label>ALGORITHM</label>
            <button class="btn-mini" onclick="openEditor('algorithm', 'ALGORITHM')">Editor / Fix</button>
            <textarea id="algorithm"></textarea>
        </div>

        <div class="input-group">
            <label>PROGRAM (Turbo C++ Syntax)</label>
            <button class="btn-mini" onclick="openEditor('program', 'PROGRAM')">Editor / Format</button>
            <textarea id="program" placeholder="#include <stdio.h>..."></textarea>
        </div>

        <div class="grid-2">
            <div class="input-group">
                <label>Standard Input (scanf)</label>
                <textarea id="stdin" style="min-height: 100px;" placeholder="Provide input if program requires it..."></textarea>
            </div>
            <div class="input-group">
                <label>OUTPUT Console</label>
                <button class="btn-mini" onclick="openEditor('output', 'OUTPUT')">Editor</button>
                <textarea id="output" style="min-height: 100px; background: #fafafa; border-style: dashed;" readonly placeholder="Verified runtime output will appear here..."></textarea>
            </div>
        </div>
        
        <button onclick="compileAndVerify()" id="btnVerify" style="width: 100%; margin-bottom: 15px;" class="btn-outline">
            Verify Compilation & Fetch Output (Wandbox API)
        </button>

        <div class="input-group">
            <label>RESULT</label>
            <button class="btn-mini" onclick="openEditor('result', 'RESULT')">Editor / Fix</button>
            <textarea id="result"></textarea>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="grid-2" style="margin-bottom: 50px;">
        <button onclick="clearFormData()" class="btn-outline">Clear Form Data</button>
        <button onclick="generatePDF()" id="btnPdf">Generate Formal PDF</button>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="modal-overlay">
    <div class="modal-content">
        <h2>System Configuration</h2>
        <div class="grid-2">
            <div class="input-group">
                <label>Course Code</label>
                <input type="text" id="cfgCourseCode" placeholder="E.g. 22UCS202">
            </div>
            <div class="input-group">
                <label>Course Name</label>
                <input type="text" id="cfgCourseName" placeholder="E.g. C Programming">
            </div>
        </div>
        <div class="input-group">
            <label>Primary AI Provider</label>
            <select id="cfgAiProvider">
                <option value="gemini">Google Gemini (2.5 Flash Preview)</option>
                <option value="openai">OpenAI (ChatGPT-4o)</option>
            </select>
        </div>
        <div class="input-group">
            <label>API Key</label>
            <input type="password" id="cfgApiKey" placeholder="Enter API Key...">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="saveSettings()" style="flex:1;">Save Settings</button>
            <button onclick="toggleModal('settingsModal')" class="btn-outline" style="flex:1;">Close</button>
        </div>
    </div>
</div>

<!-- EDITOR MODAL -->
<div id="editorModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 800px;">
        <h2 id="editorTitle">Content Editor</h2>
        <div class="modal-toolbar" id="editorToolbar">
            <button class="btn-outline" onclick="editorAction('removeIndent')">Remove Indent</button>
            <button class="btn-outline" onclick="editorAction('sentenceCase')">Sentence Case</button>
            <button class="btn-outline" onclick="editorAction('aiFixGrammar')" id="btnAiGrammar">AI: Fix Grammar/Format</button>
            <button class="btn-outline" onclick="editorAction('aiFixCode')" id="btnAiCode" style="display: none;">AI: Format & Debug Code</button>
        </div>
        <textarea id="editorArea" class="modal-editor-textarea"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="saveEditor()" style="flex:1;">Apply Changes</button>
            <button onclick="toggleModal('editorModal')" class="btn-outline" style="flex:1;">Cancel</button>
        </div>
    </div>
</div>

<div id="toast" class="save-toast">Auto-saved</div>

<script>
    /* ======================================================================
       1. SYSTEM VARIABLES & INITIALIZATION
       ====================================================================== */
    let watermarkBase64 = null;
    let customFontBase64 = null;
    let currentEditorField = null;

    const dataFields = [
        'studentName', 'regNo', 'expNo', 'expDate', 'expTitle', 
        'aim', 'algorithm', 'program', 'stdin', 'output', 'result'
    ];
    
    const configFields = ['cfgCourseCode', 'cfgCourseName', 'cfgAiProvider', 'cfgApiKey'];

    window.onload = async () => {
        loadLocalStorage();
        setupAutoSave();
        await fetchAssets();
    };

    function setStatus(msg, type = '') {
        const bar = document.getElementById('sysMsg');
        bar.textContent = msg;
        bar.className = '';
        if (type) bar.classList.add(`text-${type}`);
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    /* ======================================================================
       2. LOCAL STORAGE MANAGEMENT
       ====================================================================== */
    function loadLocalStorage() {
        dataFields.forEach(id => {
            const val = localStorage.getItem(`record_${id}`);
            if (val !== null) document.getElementById(id).value = val;
        });
        configFields.forEach(id => {
            const val = localStorage.getItem(id);
            if (val !== null) document.getElementById(id).value = val;
        });
        
        // Defaults
        if (!document.getElementById('cfgCourseCode').value) document.getElementById('cfgCourseCode').value = "22UCS202";
        if (!document.getElementById('cfgCourseName').value) document.getElementById('cfgCourseName').value = "C Programming";
    }

    function setupAutoSave() {
        dataFields.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                localStorage.setItem(`record_${id}`, document.getElementById(id).value);
                showToast('Auto-saved state');
            });
        });
    }

    function clearFormData() {
        if(confirm("Wipe laboratory data? (Configuration will be kept)")) {
            dataFields.forEach(id => {
                document.getElementById(id).value = '';
                localStorage.removeItem(`record_${id}`);
            });
            setStatus("Data cleared.");
        }
    }

    function saveSettings() {
        configFields.forEach(id => {
            localStorage.setItem(id, document.getElementById(id).value);
        });
        toggleModal('settingsModal');
        showToast('Configuration Saved');
    }

    /* ======================================================================
       3. ASSET LOADING (Watermark & Font)
       ====================================================================== */
    async function fetchAssets() {
        try {
            const wmRes = await fetch('./logo.png');
            if (wmRes.ok) {
                const blob = await wmRes.blob();
                const reader = new FileReader();
                reader.onload = (e) => { watermarkBase64 = e.target.result; document.getElementById('wmStatus').textContent = "❖ LOGO: LOADED"; document.getElementById('wmStatus').style.color = "green"; };
                reader.readAsDataURL(blob);
            } else { throw new Error(); }
        } catch(e) { document.getElementById('wmStatus').textContent = "❖ LOGO: MISSING"; document.getElementById('wmStatus').style.color = "red"; }

        try {
            const fontRes = await fetch('./font.woff');
            if (fontRes.ok) {
                const buffer = await fontRes.arrayBuffer();
                let binary = ''; const bytes = new Uint8Array(buffer);
                for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                customFontBase64 = window.btoa(binary);
                document.getElementById('fontStatus').textContent = "❖ FONT: LOADED"; document.getElementById('fontStatus').style.color = "green";
            } else { throw new Error(); }
        } catch(e) { document.getElementById('fontStatus').textContent = "❖ FONT: MISSING"; document.getElementById('fontStatus').style.color = "red"; }
    }

    /* ======================================================================
       4. AI ENGINE WRAPPER
       ====================================================================== */
    async function callAI(promptText, returnJSON = false) {
        const provider = document.getElementById('cfgAiProvider').value;
        const apiKey = document.getElementById('cfgApiKey').value.trim();
        
        if (!apiKey) throw new Error("API Key is missing. Check Configuration.");

        if (provider === 'gemini') {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
            };
            if (returnJSON) {
                payload.generationConfig = { responseMimeType: "application/json" };
            }

            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!res.ok) {
                const errData = await res.json().catch(()=>({}));
                throw new Error("Gemini Error: " + (errData.error?.message || res.statusText));
            }
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        } 
        else if (provider === 'openai') {
            const url = `https://api.openai.com/v1/chat/completions`;
            const payload = {
                model: "gpt-4o",
                messages: [{ role: "user", content: promptText }]
            };
            if (returnJSON) payload.response_format = { type: "json_object" };

            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify(payload) });
            if (!res.ok) {
                const errData = await res.json().catch(()=>({}));
                throw new Error("OpenAI Error: " + (errData.error?.message || res.statusText));
            }
            const data = await res.json();
            return data.choices[0].message.content;
        }
    }

    /* ======================================================================
       5. AUTOMATED GENERATION LOGIC
       ====================================================================== */
    async function generateFromTopic() {
        const topic = document.getElementById('aiTopic').value.trim();
        if (!topic) return alert("Please enter an experiment topic.");
        
        setStatus("Generating record structure via AI...", "processing");
        document.getElementById('btnGenerateTopic').disabled = true;

        const prompt = `Generate a classical academic laboratory record for the topic: "${topic}".
        Requirements:
        1. "title": Crisp uppercase title.
        2. "aim": Academic aim starting with "To write a C program to..."
        3. "algorithm": Step-by-step numbered list (Step 1:, Step 2:, etc).
        4. "program": C Program strictly in Turbo C++ style (include <conio.h>, use clrscr(); and getch();). Ensure proper indentation and logical correctness.
        5. "predictedOutput": Sample run output text.
        6. "result": Academic conclusion starting with "Thus the C program..."
        
        Output MUST be strict JSON. Do not use markdown wrappers.
        Keys: title, aim, algorithm, program, predictedOutput, result.`;

        try {
            const rawResponse = await callAI(prompt, true);
            const data = JSON.parse(rawResponse);
            
            document.getElementById('expTitle').value = data.title || '';
            document.getElementById('aim').value = data.aim || '';
            document.getElementById('algorithm').value = data.algorithm || '';
            document.getElementById('program').value = data.program || '';
            document.getElementById('output').value = data.predictedOutput || '';
            document.getElementById('result').value = data.result || '';
            
            // Force save
            dataFields.forEach(id => localStorage.setItem(`record_${id}`, document.getElementById(id).value));

            setStatus("Record Generated. Initiating Verification Loop...", "processing");
            
            // Kick off auto-compile and verify
            await compileAndVerify(true);

        } catch (error) {
            console.error(error);
            setStatus(error.message, "error");
        } finally {
            document.getElementById('btnGenerateTopic').disabled = false;
        }
    }

    /* ======================================================================
       6. WANDBOX COMPILATION & AUTO-FIX LOOP
       ====================================================================== */
    function preprocessForGCC(turboCode) {
        // Safe sanitization logic that comments out non-standard TurboC functions 
        // to make it purely GCC compatible for Wandbox compilation ONLY.
        let gccCode = turboCode;
        gccCode = gccCode.replace(/#include\s*<\s*conio\.h\s*>/gi, '/* #include <conio.h> */');
        gccCode = gccCode.replace(/\bclrscr\s*\(\s*\)\s*;/gi, '/* clrscr(); */');
        gccCode = gccCode.replace(/\bgetch\s*\(\s*\)\s*;/gi, '/* getch(); */');
        
        // Ensure void main is int main for GCC
        if (gccCode.match(/\bvoid\s+main\s*\(/i)) {
             gccCode = gccCode.replace(/\bvoid\s+main\s*\(/i, 'int main(');
             // Best effort append return 0; if missing
             if (!gccCode.includes("return 0;")) {
                 gccCode = gccCode.replace(/}\s*$/, '\n    return 0;\n}');
             }
        }
        return gccCode;
    }

    async function compileAndVerify(isAutoLoop = false) {
        let originalCode = document.getElementById('program').value.trim();
        const stdin = document.getElementById('stdin').value;
        const outBox = document.getElementById('output');
        const btn = document.getElementById('btnVerify');

        if (!originalCode) return alert("Program is empty.");

        btn.disabled = true;
        let success = false;
        let attempts = 0;
        const maxAttempts = 3;

        while (!success && attempts < maxAttempts) {
            attempts++;
            setStatus(`Compiling (Attempt ${attempts}/${maxAttempts})...`, "processing");
            outBox.value = `[System] Executing on GCC Server (Attempt ${attempts})...`;

            const gccCode = preprocessForGCC(originalCode);

            try {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        compiler: 'gcc-head',
                        code: gccCode,
                        stdin: stdin,
                        save: false
                    })
                });

                const data = await response.json();

                if (data.status === '0') {
                    // SUCCESS
                    success = true;
                    outBox.value = data.program_output || "Program finished with no output.";
                    localStorage.setItem('record_output', outBox.value);
                    setStatus("Compilation Successful. Output verified.", "success");
                    
                    // Auto-fix Result if this was part of the auto loop
                    if (isAutoLoop) {
                        const resPrompt = `Write a 1-sentence academic conclusion for a C program that successfully ran. Topic: ${document.getElementById('expTitle').value}. Start with "Thus the C program..." Return only text.`;
                        const newResult = await callAI(resPrompt, false);
                        if(newResult) {
                            document.getElementById('result').value = newResult;
                            localStorage.setItem('record_result', newResult);
                        }
                    }

                } else {
                    // ERROR - Send to AI for Auto-Correction
                    const errorMsg = data.compiler_error || data.program_error;
                    outBox.value = `[Compilation Error]\n${errorMsg}\n\n[System] AI is analyzing and debugging...`;
                    setStatus(`Error found. AI Debugging (Attempt ${attempts})...`, "error");

                    const fixPrompt = `The following C program failed to compile in GCC with these errors:
                    ERRORS:
                    ${errorMsg}
                    
                    ORIGINAL CODE:
                    ${originalCode}

                    Fix the logic, syntax, and structural mistakes. 
                    IMPORTANT: Output MUST be in Turbo C++ style. Retain #include <conio.h>, clrscr(); and getch(); if they belong there. 
                    Output ONLY the corrected raw C code. Do not wrap in markdown or explain.`;

                    const correctedCode = await callAI(fixPrompt, false);
                    
                    // Update original program with corrected code
                    originalCode = correctedCode.replace(/```[a-z]*\n?/g, '').replace(/```/g, '').trim();
                    document.getElementById('program').value = originalCode;
                    localStorage.setItem('record_program', originalCode);
                }

            } catch (err) {
                console.error(err);
                outBox.value = "[Network/API Error] Failed to reach Wandbox.";
                setStatus("Wandbox API connection failed.", "error");
                break; // Break loop on network failure
            }
        }

        if (!success && attempts >= maxAttempts) {
            setStatus("Max retry limit reached. Manual correction required.", "error");
        }
        
        btn.disabled = false;
    }

    /* ======================================================================
       7. SMART PASTE & PARSER
       ====================================================================== */
    function processSmartPaste() {
        const text = document.getElementById('smartPaste').value;
        if (!text.trim()) return;

        const extract = (labels) => {
            for (let lbl of labels) {
                const regex = new RegExp(`(?:${lbl})\\s*:\\s*([\\s\\S]*?)(?=\\n(?:NAME|REGISTER|EXP|DATE|TITLE|AIM|ALGORITHM|PROGRAM|OUTPUT|RESULT)\\s*:|$)`, "i");
                const m = text.match(regex);
                if (m && m[1].trim()) return m[1].trim();
            }
            return "";
        };

        const map = {
            'studentName': extract(["NAME", "STUDENT NAME"]),
            'regNo': extract(["REGISTER NO", "REG NO", "REGISTER NUMBER"]),
            'expNo': extract(["EXP NO", "EXPERIMENT NO", "EXP.NO"]),
            'expDate': extract(["DATE", "EXP DATE"]),
            'expTitle': extract(["TITLE", "EXPERIMENT TITLE"]),
            'aim': extract(["AIM"]),
            'algorithm': extract(["ALGORITHM"]),
            'program': extract(["PROGRAM", "SOURCE CODE"]),
            'output': extract(["OUTPUT"]),
            'result': extract(["RESULT", "CONCLUSION"])
        };

        dataFields.forEach(id => {
            if (map[id]) {
                document.getElementById(id).value = map[id];
                localStorage.setItem(`record_${id}`, map[id]);
            }
        });
        
        document.getElementById('smartPaste').value = '';
        setStatus("Smart Paste extraction complete.", "success");
    }

    /* ======================================================================
       8. MODAL EDITOR CONTROLS
       ====================================================================== */
    function toggleModal(id) {
        document.getElementById(id).classList.toggle('active');
    }

    function openEditor(fieldId, title) {
        currentEditorField = fieldId;
        document.getElementById('editorTitle').textContent = `Editing: ${title}`;
        document.getElementById('editorArea').value = document.getElementById(fieldId).value;
        
        // Show/Hide specific tools based on context
        document.getElementById('btnAiGrammar').style.display = (fieldId === 'aim' || fieldId === 'result' || fieldId === 'algorithm') ? 'inline-block' : 'none';
        document.getElementById('btnAiCode').style.display = (fieldId === 'program') ? 'inline-block' : 'none';
        
        toggleModal('editorModal');
    }

    function saveEditor() {
        if (currentEditorField) {
            const val = document.getElementById('editorArea').value;
            document.getElementById(currentEditorField).value = val;
            localStorage.setItem(`record_${currentEditorField}`, val);
            currentEditorField = null;
        }
        toggleModal('editorModal');
    }

    async function editorAction(action) {
        const area = document.getElementById('editorArea');
        let text = area.value;
        const originalBtnText = event.target.textContent;

        if (action === 'removeIndent') {
            area.value = text.split('\n').map(l => l.trimStart()).join('\n');
        } 
        else if (action === 'sentenceCase') {
            area.value = text.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
        }
        else if (action === 'aiFixGrammar') {
            event.target.textContent = "Fixing...";
            event.target.disabled = true;
            try {
                const prompt = `Correct the grammar, tone, and academic formatting of this laboratory text. Preserve line breaks. Text:\n${text}`;
                const refined = await callAI(prompt);
                area.value = refined.trim();
            } catch(e) { alert("AI Edit failed: " + e.message); }
            finally { event.target.textContent = originalBtnText; event.target.disabled = false; }
        }
        else if (action === 'aiFixCode') {
            event.target.textContent = "Formatting...";
            event.target.disabled = true;
            try {
                const prompt = `Format this C code with proper indentation and standard spacing. Keep it entirely Turbo C compatible if it is. Return ONLY the code. Code:\n${text}`;
                const refined = await callAI(prompt);
                area.value = refined.replace(/```[a-z]*\n?/g, '').replace(/```/g, '').trim();
            } catch(e) { alert("AI Format failed: " + e.message); }
            finally { event.target.textContent = originalBtnText; event.target.disabled = false; }
        }
    }

    /* ======================================================================
       9. FORMAL PDF GENERATOR (Matching 1a.pdf styling precisely)
       ====================================================================== */
    function generatePDF() {
        setStatus("Rendering Document...", "processing");
        const btn = document.getElementById('btnPdf');
        btn.disabled = true;

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // Collect Data
            const d = {};
            dataFields.forEach(id => d[id] = document.getElementById(id).value.trim());
            const cCourseCode = document.getElementById('cfgCourseCode').value.trim();
            const cCourseName = document.getElementById('cfgCourseName').value.trim();

            const pW = 210; const pH = 297; const margins = 20;
            const contentW = pW - (margins * 2);
            let cY = margins;
            let pageNum = 1;

            if (customFontBase64) {
                doc.addFileToVFS('DOSFont.woff', customFontBase64);
                doc.addFont('DOSFont.woff', 'DOSFont', 'normal');
            }

            function drawTemplate() {
                // A4 Strict Border
                doc.setLineWidth(0.5);
                doc.setDrawColor(0, 0, 0);
                // doc.rect(10, 10, 190, 277); // Optional Outer border

                // Watermark
                if (watermarkBase64) {
                    doc.saveGraphicsState();
                    doc.setGState(new doc.GState({ opacity: 0.10 }));
                    doc.addImage(watermarkBase64, 'PNG', 40, 80, 130, 130);
                    doc.restoreGraphicsState();
                }

                // Footer
                doc.setFont("times", "normal"); doc.setFontSize(10);
                doc.text(`${cCourseCode}-${cCourseName}`, pW - margins, pH - 15, { align: 'right' });
                
                // Header (Top Section)
                doc.setFontSize(12);
                doc.text(`Name: ${d.studentName}`, margins, 20);
                doc.text(`Reg no: ${d.regNo}`, pW - margins, 20, { align: 'right' });
                
                if (pageNum === 1) {
                    doc.text(`Exp.no: ${d.expNo}`, margins, 30);
                    doc.text(`Date: ${d.expDate}`, pW - 55, 30);
                    
                    // Experiment Title Box (centered)
                    doc.setFont("times", "bold"); doc.setFontSize(14);
                    const tLines = doc.splitTextToSize(d.expTitle.toUpperCase(), contentW - 20);
                    doc.text(tLines, pW/2, 45, { align: 'center' });
                    cY = 45 + (tLines.length * 6) + 15;
                } else {
                    cY = 35;
                }
            }

            function checkBreak(linesNeeded) {
                if (cY + (linesNeeded * 6) > pH - 25) {
                    doc.addPage(); pageNum++;
                    drawTemplate();
                }
            }

            // Init Page 1
            drawTemplate();

            const renderSection = (title, content, isCode = false) => {
                if (!content) return;
                checkBreak(3);
                doc.setFont("times", "bold"); doc.setFontSize(12);
                doc.text(title, margins, cY); cY += 8;

                if (isCode) { doc.setFont("courier", "normal"); doc.setFontSize(11); }
                else { doc.setFont("times", "normal"); doc.setFontSize(12); }

                const lines = isCode ? content.split('\n') : [content];
                lines.forEach(line => {
                    let txt = isCode ? line.replace(/\t/g, '    ') : line;
                    const splits = doc.splitTextToSize(txt, contentW);
                    splits.forEach(s => {
                        checkBreak(1);
                        doc.text(s, margins, cY); cY += 6;
                    });
                });
                cY += 5;
            };

            // Main Sections
            renderSection("AIM:", d.aim);
            renderSection("ALGORITHM:", d.algorithm);
            renderSection("PROGRAM:", d.program, true);

            // OUTPUT Section (Strictly New Page, Black Box)
            if (d.output) {
                doc.addPage(); pageNum++; drawTemplate(); cY = 35;
                
                doc.setFont("times", "bold"); doc.setFontSize(12);
                doc.text("OUTPUT:", margins, cY); cY += 8;

                if (customFontBase64) { doc.setFont('DOSFont', 'normal'); doc.setFontSize(11); }
                else { doc.setFont("courier", "normal"); doc.setFontSize(11); }

                const oLines = d.output.split('\n');
                let blockHeight = 0;
                let textToDraw = [];
                
                // Calculate height mapping
                oLines.forEach(l => {
                    const s = doc.splitTextToSize(l.replace(/\t/g, '    '), contentW - 4);
                    s.forEach(split => { textToDraw.push(split); blockHeight += 6; });
                });

                // Handle Output Pagination if too long
                let currentBlockY = cY;
                let i = 0;
                while (i < textToDraw.length) {
                    let linesInPage = 0;
                    let remainingHeight = (pH - 25) - currentBlockY;
                    let maxLines = Math.floor(remainingHeight / 6);
                    
                    if (maxLines <= 0) { doc.addPage(); pageNum++; drawTemplate(); currentBlockY = 35; remainingHeight = (pH - 25) - currentBlockY; maxLines = Math.floor(remainingHeight / 6); }
                    
                    let linesToDrawNow = Math.min(maxLines, textToDraw.length - i);
                    
                    // Draw Black Rectangle
                    doc.setFillColor(0, 0, 0);
                    doc.rect(margins, currentBlockY - 4, contentW, (linesToDrawNow * 6) + 4, 'F');
                    
                    doc.setTextColor(255, 255, 255);
                    for (let j = 0; j < linesToDrawNow; j++) {
                        doc.text(textToDraw[i], margins + 2, currentBlockY);
                        currentBlockY += 6;
                        i++;
                    }
                    doc.setTextColor(0, 0, 0);
                    cY = currentBlockY + 5;
                }
            }

            // RESULT Section
            if(d.result) {
                // Determine if we push Result to bottom
                checkBreak(5);
                // Simple logic: if there is > 50mm left, push it down. Else draw normally.
                if (pH - 25 - cY > 50) { cY = pH - 50; }
                renderSection("RESULT:", d.result);
            }

            doc.save(`${d.regNo}_${d.expNo}_Record.pdf`);
            setStatus("PDF Generated Successfully.", "success");

        } catch (err) {
            console.error(err);
            setStatus("PDF Generation Failed. Check console.", "error");
        } finally {
            btn.disabled = false;
        }
    }
</script>
